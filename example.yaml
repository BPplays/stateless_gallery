# photo-gallery example configuration
# Run with: photo-gallery -c example.yaml

global:
  favicon_png: "./favicon.png"

network:
  dns:
    - group: "dot"
      servers:
        - host: "2001:4860:4860::8888"
          type: "doh"

        - host: "2620:fe::fe"
          type: "dot"


    - group: "dns"
      servers:
      - host: "2620:fe::fe"
        type: "dns"

      - host: "2620:fe::fe"
        port: 9991
        type: "dns"


galleries:
  # Public gallery — no secret required.
  - name: "Gallery Public"
    url: "gallery_pub"
    secret: ""
    photo_dirs:
      - dir: /home/user/Pictures/public

  # Unlisted gallery — requires ?secret=secretpass in the URL.
  # Share the full URL: http://yourhost:8080/gallery_unlisted?secret=secretpass
  - name: "Gallery Unlisted"
    url: "gallery_unlisted"
    secret: "secretpass"
    photo_dirs:
      # Git-tracked directory: fetch on every scan, pull if new commits found.
      # Use git_force_pull: true to always reset to remote HEAD regardless of
      # local state (equivalent to: git fetch origin && git reset --hard FETCH_HEAD).
      # Use git_ssh_key to specify a deploy key instead of your default ~/.ssh/ keys.
      - dir: /home/user/Pictures/vacation-2024
        git: true
        git_force_pull: true
        git_ssh_key: /home/user/.ssh/gallery_deploy_key
        git_ssh_add_new_key: true
      # Plain directory — no git tracking.
      - dir: /home/user/Pictures/family

  # Backward-compatible plain-string form still works.
  - name: "Gallery Legacy"
    url: "gallery_legacy"
    photo_dirs:
      - /home/user/Pictures/old-format

# Directory used to cache generated thumbnail files.
# Created automatically on startup. Safe to delete — thumbnails regenerate on demand.
cache_dir: /tmp/photo-gallery-cache

# TCP address to listen on.
# Use "[::]:8080" to listen on all interfaces (IPv4 + IPv6).
# Use "[::1]:8080" for IPv6 loopback only.
bind: "[::1]:8080"

thumbnails:
  # true  → generate smaller AVIF thumbnails for the grid (recommended).
  # false → serve full-size originals as thumbnails; cache_dir is unused.
  enabled: true

  # Maximum dimension (width or height) in pixels; aspect ratio is preserved.
  max_size: 640

  # AVIF quality for generated thumbnails (1–100).
  quality: 90

  # Preserve HDR gainmap metadata in thumbnails:
  #
  #   JPEG — All APP* segments (EXIF, ICC profile, Apple MPF gainmap,
  #           ISO 21496-1 Ultra HDR gainmap, …) are transplanted verbatim
  #           from the original into the resized JPEG.
  #
  #   AVIF — Gainmaps are in the ISOBMFF container; they can't survive
  #           re-encoding. When true, AVIF originals are served as-is.
  #           Set false to serve resized AVIF thumbnails (gainmap lost).
  preserve_gainmaps: true
