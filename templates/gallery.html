<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Noto+Sans+JP:wght@100..900&display=swap" rel="stylesheet">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>__TITLE__</title>
        <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:      #0d0d0d;
            --surface: #181818;
            --border:  #2a2a2a;
            --text:    #e2e2e2;
            --muted:   #666;
            --accent:  #fff;
            --radius:  3px;
            --gap:     3px;
        }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', "Noto Sans JP", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Header ─────────────────────────────────────────────── */
        header {
            display: flex;
            align-items: baseline;
            gap: 14px;
            padding: 20px 24px 14px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 10;
        }
        header h1   { font-size: 1.05rem; font-weight: 600; letter-spacing: -0.01em; color: var(--accent); }
        header .count { font-size: 0.8rem; color: var(--muted); }

        /* ── Gallery grid ────────────────────────────────────────── */
        #gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: var(--gap);
            padding: var(--gap);
        }

        .thumb-item {
            aspect-ratio: 1 / 1;
            overflow: hidden;
            background: var(--surface);
            cursor: pointer;
            position: relative;
            border-radius: var(--radius);
        }
        .thumb-item img {
            width: 100%; height: 100%;
            object-fit: cover; display: block;
            transition: transform .35s cubic-bezier(.25,.46,.45,.94), opacity .2s ease;
        }
        .thumb-item:hover img { transform: scale(1.055); opacity: .88; }

        .thumb-item .label {
            position: absolute; inset: auto 0 0 0;
            padding: 28px 10px 10px;
            background: linear-gradient(transparent, rgba(0,0,0,.72));
            font-size: .72rem; color: rgba(255,255,255,.85);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            opacity: 0; transition: opacity .18s;
            pointer-events: none;
            border-radius: 0 0 var(--radius) var(--radius);
        }
        .thumb-item:hover .label { opacity: 1; }

        /* ── Empty state ─────────────────────────────────────────── */
        .empty {
            grid-column: 1/-1; text-align: center;
            padding: 80px 20px; color: var(--muted); font-size: .95rem;
        }

        /* ── Lightbox ────────────────────────────────────────────── */
        #lightbox {
            display: none; position: fixed; inset: 0; z-index: 1000;
            background: rgba(5,5,5,.97);
            align-items: center; justify-content: center;
            overflow: hidden;
        }
        #lightbox.open { display: flex; }

        #lb-stage {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            padding: 0;
            pointer-events: none;
            /* swipe drag applied via JS transform */
            will-change: transform;
        }
        #lb-img {
            width: 100%; height: 100%;
            object-fit: contain;
            display: block;
            border-radius: 2px;
            box-shadow: 0 8px 60px rgba(0,0,0,.7);
            pointer-events: auto;
            transition: opacity .15s ease;
            user-select: none; -webkit-user-drag: none;
        }
        #lb-img.fading { opacity: 0; }

        /* ── Top-right button group (close / download / share) ───── */
        #lb-topbar {
            position: absolute; top: 16px; right: 16px;
            display: flex; gap: 8px; align-items: center;
            z-index: 2;
        }
        .lb-top-btn {
            width: 38px; height: 38px; border-radius: 50%;
            border: 1px solid rgba(255,255,255,.14);
            background: rgba(255,255,255,.07);
            color: rgba(255,255,255,.65);
            font-size: 1rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background .15s, color .15s, border-color .15s;
            backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
            text-decoration: none;
        }
        .lb-top-btn:hover { background: rgba(255,255,255,.18); color: #fff; border-color: rgba(255,255,255,.3); }
        .lb-top-btn.active { color: #6ee7b7; border-color: #6ee7b7; }

        /* ── Lightbox nav buttons ────────────────────────────────── */
        .lb-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 48px; height: 48px; border-radius: 50%;
            border: 1px solid rgba(255,255,255,.14);
            background: rgba(255,255,255,.07);
            color: rgba(255,255,255,.75);
            font-size: 1.3rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background .15s, color .15s, border-color .15s;
            backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
            z-index: 2; line-height: 1;
        }
        .lb-btn:hover { background: rgba(255,255,255,.18); color: #fff; border-color: rgba(255,255,255,.3); }
        #lb-prev { left: 16px; }
        #lb-next { right: 16px; }

        /* Hide nav arrows on touch-primary devices — swipe handles navigation */
        @media (pointer: coarse) {
            #lb-prev, #lb-next { display: none; }
        }

        #lb-caption {
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: 14px 20px 14px 20px;
            display: flex; align-items: baseline; gap: 10px;
            background: linear-gradient(transparent, rgba(0,0,0,.55));
            opacity: 0;
            z-index: 2;
            pointer-events: none;
            transition: opacity .2s;
        }
        #lb-caption:hover, #lightbox.caption-visible #lb-caption { opacity: 1; }
        #lb-name    { font-size: .82rem; color: rgba(255,255,255,.7); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #lb-counter { font-size: .75rem; color: rgba(255,255,255,.35); white-space: nowrap; flex-shrink: 0; }

        #lb-copy {
            flex-shrink: 0;
            margin-left: auto;
            background: none; border: 1px solid rgba(255,255,255,.18);
            border-radius: 5px; color: rgba(255,255,255,.45);
            padding: 4px 8px; cursor: pointer;
            display: flex; align-items: center; gap: 5px;
            font-size: .72rem; font-family: inherit;
            transition: background .15s, color .15s, border-color .15s;
            pointer-events: auto;
        }
        #lb-copy:hover { background: rgba(255,255,255,.12); color: #fff; border-color: rgba(255,255,255,.35); }
        #lb-copy.copied { color: #6ee7b7; border-color: #6ee7b7; }

        #lb-spinner {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            width: 36px; height: 36px;
            border: 2px solid rgba(255,255,255,.12);
            border-top-color: rgba(255,255,255,.55);
            border-radius: 50%;
            animation: spin .7s linear infinite;
            opacity: 0; transition: opacity .2s; pointer-events: none;
        }
        #lb-spinner.visible { opacity: 1; }
        @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

        /* ── Live-reload indicator ───────────────────────────────── */
        #reload-toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(40,40,40,.92); color: #e2e2e2;
            font-size: .78rem; padding: 8px 16px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,.12);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            opacity: 0; transition: opacity .3s;
            pointer-events: none; z-index: 2000;
            white-space: nowrap;
        }
        #reload-toast.show { opacity: 1; }

        /* ── Responsive ─────────────────────────────────────────── */
        @media (max-width: 480px) {
            #gallery { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
        }
        </style>
    </head>
    <body>

        <header>
            <h1>__TITLE__</h1>
            <span class="count" id="js-count">__COUNT__</span>
        </header>

        <div id="gallery" role="list"></div>

        <div id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer">
            <div id="lb-stage">
                <img id="lb-img" src="" alt="">
            </div>
            <div id="lb-spinner" aria-hidden="true"></div>

            <!-- Top-right: share, download, close -->
            <div id="lb-topbar">
                <button class="lb-top-btn" id="lb-share" aria-label="Share image" title="Share">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
                </button>
                <a class="lb-top-btn" id="lb-download" aria-label="Download image" title="Download" download>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                </a>
                <button class="lb-top-btn" id="lb-close" aria-label="Close">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>

            <button class="lb-btn" id="lb-prev" aria-label="Previous image">&#8249;</button>
            <button class="lb-btn" id="lb-next" aria-label="Next image">&#8250;</button>

            <div id="lb-caption" aria-live="polite">
                <span id="lb-name"></span>
                <span id="lb-counter"></span>
                <button id="lb-copy" title="Copy link to this image" aria-label="Copy link to this image">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                </button>
            </div>
        </div>

        <!-- Toast shown when the gallery hot-reloads a new image count -->
        <div id="reload-toast" aria-live="polite"></div>

        <script>
(function () {
    "use strict";

    // ── Server-injected data ──────────────────────────────────────────────────
    // Each entry: { thumb: "/slug/thumb/<b64>?secret=...", full: "...", name: "..." }
    // The secret (if any) is already baked into every URL by the server.
    let IMAGES = __IMAGES_JSON__;

    // ── DOM refs ──────────────────────────────────────────────────────────────
    const gallery      = document.getElementById("gallery");
    const lightbox     = document.getElementById("lightbox");
    const lbStage      = document.getElementById("lb-stage");
    const lbImg        = document.getElementById("lb-img");
    const lbSpinner    = document.getElementById("lb-spinner");
    const lbName       = document.getElementById("lb-name");
    const lbCounter    = document.getElementById("lb-counter");
    const countEl      = document.getElementById("js-count");
    const reloadToast  = document.getElementById("reload-toast");
    const lbDownload   = document.getElementById("lb-download");
    const lbShare      = document.getElementById("lb-share");

    // ── Render grid ───────────────────────────────────────────────────────────
    function buildGrid(images) {
        gallery.innerHTML = "";

        if (images.length === 0) {
            gallery.innerHTML = '<p class="empty">No images found. Check that <code>photo_dirs</code> in your config points to a directory with supported image files.</p>';
            return;
        }

        images.forEach(function (img, i) {
            const item = document.createElement("div");
            item.className = "thumb-item";
            item.setAttribute("role", "listitem");
            item.setAttribute("tabindex", "0");
            item.setAttribute("aria-label", img.name);

            const el = document.createElement("img");
            el.src = img.thumb;
            el.alt = img.name;
            el.loading = "lazy";
            el.decoding = "async";

            const label = document.createElement("div");
            label.className = "label";
            label.textContent = img.name;

            item.appendChild(el);
            item.appendChild(label);

            function open() { openLightbox(i); }
            item.addEventListener("mousedown", open);
            item.addEventListener("keydown", function (e) {
                if (e.key === "Enter" || e.key === " ") { e.preventDefault(); open(); }
            });

            gallery.appendChild(item);
        });
    }

    buildGrid(IMAGES);

    // ── Preload cache ─────────────────────────────────────────────────────────
    // Maps full URL → HTMLImageElement that has already finished decoding.
    // Using the actual Image element (not just URL) lets us swap it directly
    // into the lightbox without triggering a second network round-trip or
    // re-decode — the browser reuses the already-decoded bitmap.
    const preloadCache = new Map();
    // Track in-flight fetches so we don't double-request the same URL.
    const preloadInFlight = new Set();

    function preloadUrl(url) {
        if (preloadCache.has(url) || preloadInFlight.has(url)) return;
        preloadInFlight.add(url);
        const pre = new Image();
        pre.onload = function () {
            preloadCache.set(url, pre);
            preloadInFlight.delete(url);
        };
        pre.onerror = function () { preloadInFlight.delete(url); };
        pre.src = url;
    }

    // Preload ±2 neighbors so rapid navigation is always instant.
    function preloadAdjacent(index) {
        if (IMAGES.length <= 1) return;
        for (var d = 1; d <= 2; d++) {
            preloadUrl(IMAGES[((index + d) % IMAGES.length + IMAGES.length) % IMAGES.length].full);
            preloadUrl(IMAGES[((index - d) % IMAGES.length + IMAGES.length) % IMAGES.length].full);
        }
    }

    // ── URL hash deep-linking ─────────────────────────────────────────────────
    function setHashForIndex(index) {
        var name = IMAGES[index] ? IMAGES[index].name : "";
        if (name) history.replaceState(null, "", "#" + encodeURIComponent(name));
    }

    function clearHash() {
        history.replaceState(null, "", location.pathname + location.search);
    }

    function indexFromHash() {
        var hash = decodeURIComponent(location.hash.slice(1));
        if (!hash) return -1;
        return IMAGES.findIndex(function (img) { return img.name === hash; });
    }

    // ── Lightbox state ────────────────────────────────────────────────────────
    let current = 0;
    // The Image element currently being fetched for display (not a preload).
    let loadingImg = null;

    function updateTopbarButtons(index) {
        var img = IMAGES[index];
        if (!img) return;
        // Download: point the <a> at the full-size image and set filename.
        lbDownload.href = img.full;
        lbDownload.setAttribute("download", img.name);
        // Share: update data used by the share handler (reads location.href).
    }

    function openLightbox(index) {
        current = index;
        lightbox.classList.add("open");
        document.body.style.overflow = "hidden";
        loadImage(current);
        setHashForIndex(current);
        updateTopbarButtons(current);
        preloadAdjacent(current);
    }

    function closeLightbox() {
        lightbox.classList.remove("open");
        document.body.style.overflow = "";
        clearHash();
        if (loadingImg) { loadingImg.src = ""; loadingImg = null; }
        lbImg.classList.remove("fading");
        lbSpinner.classList.remove("visible");
    }

    function navigate(delta) {
        if (IMAGES.length === 0) return;
        current = ((current + delta) % IMAGES.length + IMAGES.length) % IMAGES.length;
        loadImage(current);
        setHashForIndex(current);
        updateTopbarButtons(current);
        preloadAdjacent(current);
    }

    function loadImage(index) {
        const img = IMAGES[index];
        lbName.textContent = img.name;
        lbCounter.textContent = "(" + (index + 1) + "\u202f/\u202f" + IMAGES.length + ")";

        // Cancel any in-progress load that is now stale.
        if (loadingImg) { loadingImg.src = ""; loadingImg = null; }

        // ── Already the current image ─────────────────────────────────────────
        // Compare by pathname+search, ignoring origin, to avoid protocol mismatches.
        var fullPath = img.full.split("?")[0];
        var currentPath = lbImg.src ? new URL(lbImg.src, location.href).pathname : "";
        if (currentPath && currentPath === new URL(img.full, location.href).pathname
                && lbImg.complete && lbImg.naturalWidth) {
            return;
        }

        // ── Cache hit: swap the preloaded bitmap in immediately ───────────────
        // We replace lbImg.src with the cached element's src. Because the
        // browser already has the decoded bitmap for that URL in memory, this
        // renders without a visible delay or fade.
        if (preloadCache.has(img.full)) {
            lbImg.src = preloadCache.get(img.full).src;
            lbImg.alt = img.name;
            lbImg.classList.remove("fading");
            lbSpinner.classList.remove("visible");
            return;
        }

        // ── Cache miss: show spinner, load, swap in when ready ────────────────
        lbImg.classList.add("fading");
        lbSpinner.classList.add("visible");

        const newImg = new Image();
        loadingImg = newImg;

        newImg.onload = function () {
            if (loadingImg !== newImg) return; // navigated away
            preloadCache.set(img.full, newImg);
            lbImg.src = newImg.src;
            lbImg.alt = img.name;
            lbImg.classList.remove("fading");
            lbSpinner.classList.remove("visible");
            loadingImg = null;
        };

        newImg.onerror = function () {
            if (loadingImg !== newImg) return;
            lbImg.classList.remove("fading");
            lbSpinner.classList.remove("visible");
            loadingImg = null;
        };

        newImg.src = img.full;
    }

    // ── Open from hash on page load ───────────────────────────────────────────
    (function () {
        var i = indexFromHash();
        if (i >= 0) openLightbox(i);
    }());

    // ── Handle browser back/forward changing the hash ─────────────────────────
    window.addEventListener("hashchange", function () {
        var i = indexFromHash();
        if (i >= 0) {
            if (!lightbox.classList.contains("open")) {
                openLightbox(i);
            } else {
                current = i;
                loadImage(i);
                updateTopbarButtons(i);
                preloadAdjacent(i);
            }
        } else {
            if (lightbox.classList.contains("open")) {
                lightbox.classList.remove("open");
                document.body.style.overflow = "";
                if (loadingImg) { loadingImg.src = ""; loadingImg = null; }
            }
        }
    });

    // ── Controls ──────────────────────────────────────────────────────────────
    document.getElementById("lb-prev").addEventListener("mousedown", function () { navigate(-1); });
    document.getElementById("lb-next").addEventListener("mousedown", function () { navigate(1); });
    document.getElementById("lb-close").addEventListener("mousedown", closeLightbox);

    lightbox.addEventListener("mousedown", function (e) {
        if (e.target === lightbox || e.target.id === "lb-stage") closeLightbox();
    });

    // ── Keyboard ──────────────────────────────────────────────────────────────
    document.addEventListener("keydown", function (e) {
        if (!lightbox.classList.contains("open")) return;
        if (e.key === "Escape")                    { closeLightbox(); return; }
        if (e.key === "ArrowLeft"  || e.key === "h" || e.key === "a") navigate(-1);
        if (e.key === "ArrowRight" || e.key === "l" || e.key === "d") navigate(1);
    });

    // ── Touch / swipe ─────────────────────────────────────────────────────────
    // Tracks the active pointer so we can apply real-time drag feedback and
    // commit or snap back based on final velocity + distance.
    var touchStartX = 0, touchStartY = 0;
    var touchStartTime = 0;
    var dragActive = false;
    var SWIPE_MIN_DIST = 40;   // px — minimum distance to count as a swipe
    var SWIPE_MIN_VEL  = 0.3;  // px/ms — minimum velocity for a flick
    var SWIPE_AXIS_LOCK = 1.5; // horizontal must exceed vertical by this factor

    function setStageX(x) {
        lbStage.style.transform = x === 0 ? "" : "translateX(" + x + "px)";
    }

    lightbox.addEventListener("touchstart", function (e) {
        // Only track single-finger touches on the stage/image area.
        if (e.touches.length !== 1) return;
        if (e.target.closest("#lb-topbar") || e.target.closest("#lb-caption")) return;
        touchStartX    = e.touches[0].clientX;
        touchStartY    = e.touches[0].clientY;
        touchStartTime = Date.now();
        dragActive     = true;
        // Disable transition during drag for immediate feedback.
        lbStage.style.transition = "none";
    }, { passive: true });

    lightbox.addEventListener("touchmove", function (e) {
        if (!dragActive || e.touches.length !== 1) return;
        var dx = e.touches[0].clientX - touchStartX;
        var dy = e.touches[0].clientY - touchStartY;

        // Lock to horizontal axis: if the gesture is more vertical, abort drag.
        if (Math.abs(dy) > Math.abs(dx) * SWIPE_AXIS_LOCK && Math.abs(dy) > 10) {
            dragActive = false;
            setStageX(0);
            return;
        }

        // Apply drag with light rubber-band resistance at the edges.
        var resist = 0.35;
        setStageX(dx * resist);
    }, { passive: true });

    lightbox.addEventListener("touchend", function (e) {
        if (!dragActive) return;
        dragActive = false;

        var dx       = e.changedTouches[0].clientX - touchStartX;
        var dy       = e.changedTouches[0].clientY - touchStartY;
        var elapsed  = Date.now() - touchStartTime;
        var velocity = Math.abs(dx) / elapsed;

        // Restore smooth transition for the snap-back or commit.
        lbStage.style.transition = "transform .25s cubic-bezier(.25,.46,.45,.94)";
        setStageX(0);

        // Commit as swipe if: axis is mostly horizontal AND
        // (distance is large enough OR velocity is high enough).
        if (Math.abs(dx) > Math.abs(dy) * SWIPE_AXIS_LOCK) {
            if (Math.abs(dx) > SWIPE_MIN_DIST || velocity > SWIPE_MIN_VEL) {
                navigate(dx < 0 ? 1 : -1);
            }
        }

        // Clean up transition override after animation completes.
        setTimeout(function () { lbStage.style.transition = ""; }, 260);
    }, { passive: true });

    lightbox.addEventListener("touchcancel", function () {
        if (!dragActive) return;
        dragActive = false;
        lbStage.style.transition = "transform .25s cubic-bezier(.25,.46,.45,.94)";
        setStageX(0);
        setTimeout(function () { lbStage.style.transition = ""; }, 260);
    }, { passive: true });

    // ── Share button ──────────────────────────────────────────────────────────
    lbShare.addEventListener("mousedown", function (e) { e.stopPropagation(); });
    lbShare.addEventListener("click", function () {
        var img = IMAGES[current];
        if (!img) return;
        var url = location.href; // includes the #filename hash

        // Use the native share sheet when available (iOS Safari, Android Chrome).
        if (navigator.share) {
            navigator.share({ title: img.name, url: url }).catch(function () {});
            return;
        }

        // Desktop fallback: copy link and flash the button green.
        var btn = lbShare;
        function flash() {
            btn.classList.add("active");
            setTimeout(function () { btn.classList.remove("active"); }, 1800);
        }

        navigator.clipboard.writeText(url).then(flash).catch(function () {
            var tmp = document.createElement("input");
            tmp.value = url;
            document.body.appendChild(tmp);
            tmp.select();
            document.execCommand("copy");
            document.body.removeChild(tmp);
            flash();
        });
    });

    // ── Download button ───────────────────────────────────────────────────────
    // It's a plain <a download> — the browser handles it natively.
    // We just need to stop the mousedown from closing the lightbox.
    lbDownload.addEventListener("mousedown", function (e) { e.stopPropagation(); });

    // ── Copy-link button (caption bar) ────────────────────────────────────────
    (function () {
        var btn = document.getElementById("lb-copy");
        btn.addEventListener("mousedown", function (e) { e.stopPropagation(); });
        btn.addEventListener("click", function () {
            var url = location.href;
            navigator.clipboard.writeText(url).then(function () {
                btn.classList.add("copied");
                setTimeout(function () { btn.classList.remove("copied"); }, 1800);
            }).catch(function () {
                var tmp = document.createElement("input");
                tmp.value = url;
                document.body.appendChild(tmp);
                tmp.select();
                document.execCommand("copy");
                document.body.removeChild(tmp);
                btn.classList.add("copied");
                setTimeout(function () { btn.classList.remove("copied"); }, 1800);
            });
        });
    }());

    // ── Hot-reload polling ────────────────────────────────────────────────────
    // Poll the current page URL every 10 s. If the server returns a different
    // image count the gallery is rebuilt in-place without a full page reload.
    // The secret is already in the URL so this works for protected galleries too.
    (function startPolling() {
        var INTERVAL = 10000; // 10 s

        function poll() {
            fetch(location.href, { cache: "no-store" })
                .then(function (r) { return r.text(); })
                .then(function (html) {
                    var match = html.match(/let IMAGES = (\[[\s\S]*?\]);/);
                    if (!match) return;
                    var fresh;
                    try { fresh = JSON.parse(match[1]); } catch (e) { return; }

                    if (fresh.length === IMAGES.length) return; // nothing changed

                    var added   = fresh.length - IMAGES.length;
                    var message = added > 0
                        ? "+" + added + " new photo" + (added === 1 ? "" : "s")
                        : Math.abs(added) + " photo" + (Math.abs(added) === 1 ? "" : "s") + " removed";

                    IMAGES = fresh;
                    buildGrid(IMAGES);
                    var plural = fresh.length === 1 ? "" : "s";
                    countEl.textContent = fresh.length + " photo" + plural;

                    // Close lightbox if the image it was showing was removed.
                    if (lightbox.classList.contains("open") && current >= IMAGES.length) {
                        closeLightbox();
                    }

                    reloadToast.textContent = message;
                    reloadToast.classList.add("show");
                    setTimeout(function () { reloadToast.classList.remove("show"); }, 3000);
                })
                .catch(function () { /* silently ignore network errors */ });
        }

        setInterval(poll, INTERVAL);
    }());

}());
        </script>
    </body>
</html>
