<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Noto+Sans+JP:wght@100..900&display=swap" rel="stylesheet">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>__TITLE__</title>
        <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:      #0d0d0d;
            --surface: #181818;
            --border:  #2a2a2a;
            --text:    #e2e2e2;
            --muted:   #666;
            --accent:  #fff;
            --radius:  3px;
            --gap:     3px;
        }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', "Noto Sans JP", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Header ─────────────────────────────────────────────── */
        header {
            display: flex;
            align-items: baseline;
            gap: 14px;
            padding: 20px 24px 14px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 10;
        }
        header h1   { font-size: 1.05rem; font-weight: 600; letter-spacing: -0.01em; color: var(--accent); }
        header .count { font-size: 0.8rem; color: var(--muted); }

        /* ── Gallery grid ────────────────────────────────────────── */
        #gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: var(--gap);
            padding: var(--gap);
        }

        .thumb-item {
            aspect-ratio: 1 / 1;
            overflow: hidden;
            background: var(--surface);
            cursor: pointer;
            position: relative;
            border-radius: var(--radius);
        }
        .thumb-item img {
            width: 100%; height: 100%;
            object-fit: cover; display: block;
            transition: transform .35s cubic-bezier(.25,.46,.45,.94), opacity .2s ease;
        }
        .thumb-item:hover img { transform: scale(1.055); opacity: .88; }

        .thumb-item .label {
            position: absolute; inset: auto 0 0 0;
            padding: 28px 10px 10px;
            background: linear-gradient(transparent, rgba(0,0,0,.72));
            font-size: .72rem; color: rgba(255,255,255,.85);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            opacity: 0; transition: opacity .18s;
            pointer-events: none;
            border-radius: 0 0 var(--radius) var(--radius);
        }
        .thumb-item:hover .label { opacity: 1; }

        /* ── Empty state ─────────────────────────────────────────── */
        .empty {
            grid-column: 1/-1; text-align: center;
            padding: 80px 20px; color: var(--muted); font-size: .95rem;
        }

        /* ── Lightbox ────────────────────────────────────────────── */
        #lightbox {
            display: none; position: fixed; inset: 0; z-index: 1000;
            background: rgba(5,5,5,.97);
            overflow: hidden;
        }
        #lightbox.open { display: block; }

        /* Stage clips the track to exactly one viewport width. */
        #lb-stage {
            position: absolute; inset: 0;
            overflow: hidden;
        }

        /*
         * Three-slot image track: [prev][curr][next]
         * Width is 300% of the stage so each slot = 100% of the stage.
         * Default translateX(-33.333%) centres the middle slot.
         * During a swipe the JS applies translateX(calc(-33.333% + Npx)).
         * On commit it animates to -66.666% or 0%, then instantly reshuffles
         * the DOM and snaps back to -33.333% — no network hit, no flicker.
         */
        #lb-track {
            display: flex;
            width: 300%;
            height: 100%;
            transform: translateX(-33.333%);
            /* will-change applied by JS only during active drag/animation
               to avoid permanently promoting 3 full-viewport images to GPU
               layers, which exhausts VRAM on iOS and causes renderer crashes */
        }

        .lb-slide {
            /* Each slot = 1/3 of 300% track = 100% of stage */
            width: 33.333%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .lb-slide img {
            max-width: 100%; max-height: 100%;
            width: 100%; height: 100%;
            object-fit: contain; display: block;
            border-radius: 2px;
            user-select: none; -webkit-user-drag: none;
        }

        /* Fade transition and shadow only on the active centre slot. */
        #lb-slide-curr img {
            box-shadow: 0 8px 60px rgba(0,0,0,.7);
            transition: opacity .15s ease;
        }
        #lb-slide-curr img.fading { opacity: 0; }

        /* ── Top-right button group ──────────────────────────────── */
        #lb-topbar {
            position: absolute; top: 16px; right: 16px;
            display: flex; gap: 8px; align-items: center;
            z-index: 2;
        }
        #lb-fullscreen {
            position: absolute; top: 16px; left: 16px;
            width: 38px; height: 38px; border-radius: 50%;
            border: 1px solid rgba(255,255,255,.14);
            background: rgba(255,255,255,.07);
            color: rgba(255,255,255,.65);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background .15s, color .15s, border-color .15s;
            backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
            z-index: 2;
        }
        #lb-fullscreen:hover { background: rgba(255,255,255,.18); color: #fff; border-color: rgba(255,255,255,.3); }
        /* Hide on devices that don't support fullscreen (e.g. iOS Safari) */
        #lb-fullscreen.unsupported { display: none; }
        .lb-top-btn {
            width: 38px; height: 38px; border-radius: 50%;
            border: 1px solid rgba(255,255,255,.14);
            background: rgba(255,255,255,.07);
            color: rgba(255,255,255,.65);
            font-size: 1rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background .15s, color .15s, border-color .15s;
            backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
            text-decoration: none;
        }
        .lb-top-btn:hover { background: rgba(255,255,255,.18); color: #fff; border-color: rgba(255,255,255,.3); }
        .lb-top-btn.active { color: #6ee7b7; border-color: #6ee7b7; }

        /* ── Nav arrows (hidden on touch devices) ────────────────── */
        .lb-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 48px; height: 48px; border-radius: 50%;
            border: 1px solid rgba(255,255,255,.14);
            background: rgba(255,255,255,.07);
            color: rgba(255,255,255,.75);
            font-size: 1.3rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background .15s, color .15s, border-color .15s;
            backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
            z-index: 2; line-height: 1;
        }
        .lb-btn:hover { background: rgba(255,255,255,.18); color: #fff; border-color: rgba(255,255,255,.3); }
        #lb-prev { left: 16px; }
        #lb-next { right: 16px; }
        @media (pointer: coarse) { #lb-prev, #lb-next { display: none; } }

        /* ── Caption bar ─────────────────────────────────────────── */
        #lb-caption {
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: 14px 20px;
            display: flex; align-items: baseline; gap: 10px;
            background: linear-gradient(transparent, rgba(0,0,0,.55));
            opacity: 0; z-index: 2;
            pointer-events: none;
            transition: opacity .2s;
        }
        #lb-caption:hover { opacity: 1; }
        #lb-name    { font-size: .82rem; color: rgba(255,255,255,.7); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #lb-counter { font-size: .75rem; color: rgba(255,255,255,.35); white-space: nowrap; flex-shrink: 0; }
        #lb-copy {
            flex-shrink: 0; margin-left: auto;
            background: none; border: 1px solid rgba(255,255,255,.18);
            border-radius: 5px; color: rgba(255,255,255,.45);
            padding: 4px 8px; cursor: pointer;
            display: flex; align-items: center; gap: 5px;
            font-size: .72rem; font-family: inherit;
            transition: background .15s, color .15s, border-color .15s;
            pointer-events: auto;
        }
        #lb-copy:hover { background: rgba(255,255,255,.12); color: #fff; border-color: rgba(255,255,255,.35); }
        #lb-copy.copied { color: #6ee7b7; border-color: #6ee7b7; }

        /* ── Spinner ─────────────────────────────────────────────── */
        #lb-spinner {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            width: 36px; height: 36px;
            border: 2px solid rgba(255,255,255,.12);
            border-top-color: rgba(255,255,255,.55);
            border-radius: 50%;
            animation: spin .7s linear infinite;
            opacity: 0; transition: opacity .2s; pointer-events: none;
            z-index: 3;
        }
        #lb-spinner.visible { opacity: 1; }
        @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

        /* ── Live-reload toast ───────────────────────────────────── */
        #reload-toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(40,40,40,.92); color: #e2e2e2;
            font-size: .78rem; padding: 8px 16px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,.12);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            opacity: 0; transition: opacity .3s;
            pointer-events: none; z-index: 2000; white-space: nowrap;
        }
        #reload-toast.show { opacity: 1; }

        @media (max-width: 480px) {
            #gallery { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
        }
        </style>
    </head>
    <body>

        <header>
            <h1>__TITLE__</h1>
            <span class="count" id="js-count">__COUNT__</span>
        </header>

        <div id="gallery" role="list"></div>

        <div id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer">
            <div id="lb-stage">
                <div id="lb-track">
                    <div class="lb-slide" id="lb-slide-prev"><img id="lb-img-prev" src="" alt=""></div>
                    <div class="lb-slide" id="lb-slide-curr"><img id="lb-img-curr" src="" alt=""></div>
                    <div class="lb-slide" id="lb-slide-next"><img id="lb-img-next" src="" alt=""></div>
                </div>
            </div>
            <div id="lb-spinner" aria-hidden="true"></div>

            <button id="lb-fullscreen" aria-label="Toggle fullscreen" title="Fullscreen">
                <svg id="lb-fs-enter" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
                <svg id="lb-fs-exit" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="10" y1="14" x2="3" y2="21"/><line x1="21" y1="3" x2="14" y2="10"/></svg>
            </button>

            <div id="lb-topbar">
                <button class="lb-top-btn" id="lb-share" aria-label="Share image" title="Share">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
                </button>
                <a class="lb-top-btn" id="lb-download" aria-label="Download image" title="Download" download>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                </a>
                <button class="lb-top-btn" id="lb-close" aria-label="Close">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>

            <button class="lb-btn" id="lb-prev" aria-label="Previous image">&#8249;</button>
            <button class="lb-btn" id="lb-next" aria-label="Next image">&#8250;</button>

            <div id="lb-caption" aria-live="polite">
                <span id="lb-name"></span>
                <span id="lb-counter"></span>
                <button id="lb-copy" title="Copy link to this image" aria-label="Copy link to this image">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                </button>
            </div>
        </div>

        <div id="reload-toast" aria-live="polite"></div>

        <script>
(function () {
    "use strict";

    let IMAGES = __IMAGES_JSON__;

    // ── DOM refs ──────────────────────────────────────────────────────────────
    const gallery     = document.getElementById("gallery");
    const lightbox    = document.getElementById("lightbox");
    const lbTrack     = document.getElementById("lb-track");
    const lbImgPrev   = document.getElementById("lb-img-prev");
    const lbImgCurr   = document.getElementById("lb-img-curr");
    const lbImgNext   = document.getElementById("lb-img-next");
    const lbSpinner   = document.getElementById("lb-spinner");
    const lbName      = document.getElementById("lb-name");
    const lbCounter   = document.getElementById("lb-counter");
    const countEl     = document.getElementById("js-count");
    const reloadToast = document.getElementById("reload-toast");
    const lbDownload  = document.getElementById("lb-download");
    const lbShare     = document.getElementById("lb-share");

    // ── Render grid ───────────────────────────────────────────────────────────
    function buildGrid(images) {
        gallery.innerHTML = "";
        if (images.length === 0) {
            gallery.innerHTML = '<p class="empty">No images found. Check that <code>photo_dirs</code> in your config points to a directory with supported image files.</p>';
            return;
        }
        images.forEach(function (img, i) {
            const item = document.createElement("div");
            item.className = "thumb-item";
            item.setAttribute("role", "listitem");
            item.setAttribute("tabindex", "0");
            item.setAttribute("aria-label", img.name);

            const el = document.createElement("img");
            el.src = img.thumb; el.alt = img.name;
            el.loading = "lazy"; el.decoding = "async";

            const label = document.createElement("div");
            label.className = "label";
            label.textContent = img.name;

            item.appendChild(el);
            item.appendChild(label);

            function open() { openLightbox(i); }
            item.addEventListener("mousedown", open);
            item.addEventListener("keydown", function (e) {
                if (e.key === "Enter" || e.key === " ") { e.preventDefault(); open(); }
            });
            gallery.appendChild(item);
        });
    }

    buildGrid(IMAGES);

    // ── Preload cache ─────────────────────────────────────────────────────────
    // Maps full URL → HTMLImageElement confirmed loaded + decoded.
    //
    // IMPORTANT: we always wait for onload before calling decode().
    // iOS Safari's decode() implementation can reject immediately (before the
    // network fetch completes) instead of waiting as the spec requires.
    // Calling decode() on a not-yet-loaded Image causes the catch to run with
    // an incomplete element, which then gets cached and later crashes the
    // renderer when its src is set on a visible <img>.  Waiting for onload
    // first is safe on every browser.
    const preloadCache    = new Map();
    const preloadInFlight = new Set();

    function preloadUrl(url) {
        if (preloadCache.has(url) || preloadInFlight.has(url)) return;
        preloadInFlight.add(url);
        var pre = new Image();
        pre.onload = function () {
            if (typeof pre.decode === "function") {
                pre.decode()
                    .catch(function () {}) // decode failed but image is still displayable
                    .finally(function () {
                        preloadCache.set(url, pre);
                        preloadInFlight.delete(url);
                    });
            } else {
                preloadCache.set(url, pre);
                preloadInFlight.delete(url);
            }
        };
        pre.onerror = function () { preloadInFlight.delete(url); };
        pre.src = url;
    }

    function preloadAdjacent(index) {
        if (IMAGES.length <= 1) return;
        for (var d = 1; d <= 1; d++) {
            preloadUrl(IMAGES[((index + d) % IMAGES.length + IMAGES.length) % IMAGES.length].full);
            preloadUrl(IMAGES[((index - d) % IMAGES.length + IMAGES.length) % IMAGES.length].full);
        }
    }

    // ── Slot loading ──────────────────────────────────────────────────────────
    // Generation counter: incremented each time the centre slot gets a new
    // load request. Any async callback that checks isCentre compares against
    // this to discard results that arrived after the user navigated away.
    var loadGeneration = 0;

    function loadIntoSlot(slotEl, imgData, showSpinner) {
        if (!imgData) return;

        var myGen = showSpinner ? ++loadGeneration : 0;

        function applyImage(imgEl) {
            // Discard stale centre-slot results
            if (showSpinner && myGen !== loadGeneration) return;
            preloadCache.set(imgData.full, imgEl);
            slotEl.src = imgEl.src;
            slotEl.alt = imgData.name;
            if (showSpinner) {
                lbImgCurr.classList.remove("fading");
                lbSpinner.classList.remove("visible");
            }
        }

        // Cache hit: decoded bitmap already in memory, swap instantly.
        if (preloadCache.has(imgData.full)) {
            slotEl.src = preloadCache.get(imgData.full).src;
            slotEl.alt = imgData.name;
            if (showSpinner) {
                lbImgCurr.classList.remove("fading");
                lbSpinner.classList.remove("visible");
            }
            return;
        }

        if (showSpinner) {
            lbImgCurr.classList.add("fading");
            lbSpinner.classList.add("visible");
        }

        var newImg = new Image();
        newImg.onload = function () {
            // Image loaded from network. Now pre-decode so setting slotEl.src
            // doesn't block the compositor thread.
            if (typeof newImg.decode === "function") {
                newImg.decode()
                    .catch(function () {}) // decode failed; image still renderable
                    .finally(function () { applyImage(newImg); });
            } else {
                applyImage(newImg);
            }
        };
        newImg.onerror = function () {
            if (showSpinner) {
                lbImgCurr.classList.remove("fading");
                lbSpinner.classList.remove("visible");
            }
        };
        newImg.src = imgData.full;
    }

    // Populate all three slots for a given centre index.
    // Side slots are deferred by one animation frame so the centre slot
    // gets the first crack at network and decode resources — the user
    // only sees the centre image when the lightbox opens.
    function loadAllSlots(index) {
        const n = IMAGES.length;
        lbName.textContent    = IMAGES[index].name;
        lbCounter.textContent = "(" + (index + 1) + "\u202f/\u202f" + n + ")";

        loadIntoSlot(lbImgCurr, IMAGES[index], true);

        if (n > 1) {
            requestAnimationFrame(function () {
                loadIntoSlot(lbImgPrev, IMAGES[(index - 1 + n) % n], false);
                loadIntoSlot(lbImgNext, IMAGES[(index + 1) % n],     false);
            });
        }
    }

    // ── URL hash deep-linking ─────────────────────────────────────────────────
    function setHashForIndex(index) {
        var name = IMAGES[index] ? IMAGES[index].name : "";
        if (name) history.replaceState(null, "", "#" + encodeURIComponent(name));
    }
    function clearHash() {
        history.replaceState(null, "", location.pathname + location.search);
    }
    function indexFromHash() {
        var hash = decodeURIComponent(location.hash.slice(1));
        if (!hash) return -1;
        return IMAGES.findIndex(function (img) { return img.name === hash; });
    }

    // ── Lightbox state ────────────────────────────────────────────────────────
    let current = 0;

    function updateTopbarButtons(index) {
        var img = IMAGES[index];
        if (!img) return;
        lbDownload.href = img.full;
        lbDownload.setAttribute("download", img.name);
    }

    function openLightbox(index) {
        current = index;
        lightbox.classList.add("open");
        document.body.style.overflow = "hidden";
        loadAllSlots(current);
        setHashForIndex(current);
        updateTopbarButtons(current);
        preloadAdjacent(current);
    }

    function closeLightbox() {
        lightbox.classList.remove("open");
        document.body.style.overflow = "";
        clearHash();
        // Bump generation so any in-flight centre-slot load is discarded
        loadGeneration++;
        lbImgCurr.classList.remove("fading");
        lbSpinner.classList.remove("visible");
    }

    // Non-swipe navigation (keyboard / arrow buttons): cross-fade the centre
    // slot and update all three positions for the next swipe.
    function navigate(delta) {
        if (IMAGES.length === 0 || swipeAnimating) return;
        commitSwipe(delta);
    }

    // ── Open from hash on page load ───────────────────────────────────────────
    (function () {
        var i = indexFromHash();
        if (i >= 0) openLightbox(i);
    }());

    // ── Handle browser back/forward ───────────────────────────────────────────
    window.addEventListener("hashchange", function () {
        var i = indexFromHash();
        if (i >= 0) {
            if (!lightbox.classList.contains("open")) { openLightbox(i); }
            else { current = i; loadAllSlots(i); updateTopbarButtons(i); preloadAdjacent(i); }
        } else {
            if (lightbox.classList.contains("open")) {
                lightbox.classList.remove("open");
                document.body.style.overflow = "";
                loadGeneration++;
            }
        }
    });

    // ── Controls ──────────────────────────────────────────────────────────────
    document.getElementById("lb-prev").addEventListener("mousedown", function () { navigate(-1); });
    document.getElementById("lb-next").addEventListener("mousedown", function () { navigate(1); });
    document.getElementById("lb-close").addEventListener("mousedown", closeLightbox);

    // Close on backdrop click (anything that isn't a slide image or UI element).
    lightbox.addEventListener("mousedown", function (e) {
        var t = e.target;
        if (t === lightbox || t.id === "lb-stage" || t.id === "lb-track" || t.classList.contains("lb-slide")) {
            closeLightbox();
        }
    });

    // ── Keyboard ──────────────────────────────────────────────────────────────
    document.addEventListener("keydown", function (e) {
        if (!lightbox.classList.contains("open")) return;
        if (e.key === "Escape")                                   { closeLightbox(); return; }
        if (e.key === "ArrowLeft"  || e.key === "h" || e.key === "a") navigate(-1);
        if (e.key === "ArrowRight" || e.key === "l" || e.key === "d") navigate(1);
    });

    // ── Touch / swipe ─────────────────────────────────────────────────────────
    // The track holds [prev][curr][next] side-by-side. Dragging it moves all
    // three simultaneously so the arriving image is visibly sliding in.
    // On a committed swipe we animate to the arriving slot, then instantly
    // reshuffle the DOM (no network hit) and snap back to centre.
    var touchStartX   = 0, touchStartY = 0, touchStartTime = 0;
    var dragActive    = false;
    var swipeAnimating = false;          // block new swipes during settle animation
    var SWIPE_MIN_DIST  = 40;            // px
    var SWIPE_MIN_VEL   = 0.3;           // px/ms
    var SWIPE_AXIS_LOCK = 1.5;
    var ANIM_MS         = 280;

    // Base translateX of the track is -33.333% (centres the middle slot).
    // During a drag we apply an additional pixel offset on top of that.
    function setTrackX(extraPx) {
        if (extraPx === 0) {
            lbTrack.style.transform = "translateX(-33.333%)";
        } else {
            lbTrack.style.transform = "translateX(calc(-33.333% + " + extraPx + "px))";
        }
    }

    lightbox.addEventListener("touchstart", function (e) {
        if (swipeAnimating) return;
        if (e.touches.length !== 1) return;
        if (e.target.closest("#lb-topbar") || e.target.closest("#lb-caption") || e.target.closest("#lb-fullscreen")) return;
        touchStartX    = e.touches[0].clientX;
        touchStartY    = e.touches[0].clientY;
        touchStartTime = Date.now();
        dragActive     = true;
        lbTrack.style.willChange = "transform";
        lbTrack.style.transition = "none";
    }, { passive: true });

    lightbox.addEventListener("touchmove", function (e) {
        if (!dragActive || e.touches.length !== 1) return;
        var dx = e.touches[0].clientX - touchStartX;
        var dy = e.touches[0].clientY - touchStartY;

        // Abort drag if gesture is primarily vertical.
        if (Math.abs(dy) > Math.abs(dx) * SWIPE_AXIS_LOCK && Math.abs(dy) > 10) {
            dragActive = false;
            lbTrack.style.willChange = "";
            lbTrack.style.transition = "";
            setTrackX(0);
            return;
        }

        // At ±1 image the edges are already in frame; beyond that add rubber-band
        // resistance so it feels like there's nothing further to reveal.
        var n = IMAGES.length;
        if (n <= 1) return; // nothing to swipe to
        setTrackX(dx);
    }, { passive: true });

    lightbox.addEventListener("touchend", function (e) {
        if (!dragActive) return;
        dragActive = false;

        var dx      = e.changedTouches[0].clientX - touchStartX;
        var dy      = e.changedTouches[0].clientY - touchStartY;
        var elapsed = Date.now() - touchStartTime;
        var vel     = Math.abs(dx) / elapsed;

        var isHoriz = Math.abs(dx) > Math.abs(dy) * SWIPE_AXIS_LOCK;
        var isSwipe = isHoriz && (Math.abs(dx) > SWIPE_MIN_DIST || vel > SWIPE_MIN_VEL);

        if (isSwipe && IMAGES.length > 1) {
            var direction = dx < 0 ? 1 : -1; // negative dx = swiped left = next
            commitSwipe(direction);
        } else {
            // Snap back.
            lbTrack.style.transition = "transform " + ANIM_MS + "ms cubic-bezier(.25,.46,.45,.94)";
            setTrackX(0);
            setTimeout(function () {
                lbTrack.style.transition = "";
                lbTrack.style.willChange = "";
            }, ANIM_MS + 10);
        }
    }, { passive: true });

    lightbox.addEventListener("touchcancel", function () {
        if (!dragActive) return;
        dragActive = false;
        lbTrack.style.transition = "transform " + ANIM_MS + "ms cubic-bezier(.25,.46,.45,.94)";
        setTrackX(0);
        setTimeout(function () {
            lbTrack.style.transition = "";
            lbTrack.style.willChange = "";
        }, ANIM_MS + 10);
    }, { passive: true });

    function commitSwipe(direction) {
        // direction: +1 = going to next (swipe left), -1 = going to prev (swipe right)
        swipeAnimating = true;
        var n = IMAGES.length;

        // Promote track to GPU layer only for the duration of the animation.
        // Keeping will-change permanently exhausts VRAM on iOS with 3 large images.
        lbTrack.style.willChange = "transform";

        // Animate to the arriving slot.
        // direction=+1 → slide track left so the right slot (next) fills the view.
        // direction=-1 → slide track right so the left slot (prev) fills the view.
        var targetX = direction > 0 ? "-66.666%" : "0%";
        lbTrack.style.transition = "transform " + ANIM_MS + "ms cubic-bezier(.25,.46,.45,.94)";
        lbTrack.style.transform  = "translateX(" + targetX + ")";

        setTimeout(function () {
            // Update current index.
            current = ((current + direction) % n + n) % n;

            // ── DOM reshuffle ─────────────────────────────────────────────────
            // The arriving slot already shows the correct image (populated by
            // loadAllSlots when the lightbox opened / last navigation ran).
            // Swap src references between slots, but do NOT start loading the
            // vacated far slot here — that happens below in requestIdleCallback
            // so it doesn't compete with the post-animation repaint.
            lbTrack.style.transition = "none";

            // Capture which slot needs filling and which image goes there,
            // before we modify the srcs.
            var slotToFill, imgToLoad;
            if (direction > 0) {
                // Moved to next: arriving slot was lbImgNext.
                slotToFill = lbImgNext;
                imgToLoad  = IMAGES[(current + 1) % n];
                lbImgPrev.src = lbImgCurr.src;  lbImgPrev.alt = lbImgCurr.alt;
                lbImgCurr.src = lbImgNext.src;  lbImgCurr.alt = lbImgNext.alt;
                lbImgNext.src = "";              lbImgNext.alt = "";
            } else {
                // Moved to prev: arriving slot was lbImgPrev.
                slotToFill = lbImgPrev;
                imgToLoad  = IMAGES[(current - 1 + n) % n];
                lbImgNext.src = lbImgCurr.src;  lbImgNext.alt = lbImgCurr.alt;
                lbImgCurr.src = lbImgPrev.src;  lbImgCurr.alt = lbImgPrev.alt;
                lbImgPrev.src = "";              lbImgPrev.alt = "";
            }

            // Reset track to centre without a visible jump.
            setTrackX(0);

            // Update caption, hash, topbar.
            lbName.textContent    = IMAGES[current].name;
            lbCounter.textContent = "(" + (current + 1) + "\u202f/\u202f" + n + ")";
            setHashForIndex(current);
            updateTopbarButtons(current);

            // Re-enable transition one frame later so the snap isn't animated.
            requestAnimationFrame(function () {
                lbTrack.style.transition = "";
                lbTrack.style.willChange = ""; // release GPU layer
                swipeAnimating = false;
            });

            // ── Deferred background work ──────────────────────────────────────
            // Load the vacated far slot and kick off ±2 preloads only when the
            // browser is idle. This keeps the post-animation repaint smooth
            // even when the target image hasn't been fetched yet.
            var idleWork = function () {
                loadIntoSlot(slotToFill, imgToLoad, false);
                preloadAdjacent(current);
            };
            if (typeof requestIdleCallback === "function") {
                requestIdleCallback(idleWork, { timeout: 500 });
            } else {
                // Safari <16 / older browsers: small delay is enough.
                setTimeout(idleWork, 100);
            }
        }, ANIM_MS + 10);
    }

    // ── Fullscreen ────────────────────────────────────────────────────────────
    (function () {
        var btn      = document.getElementById("lb-fullscreen");
        var iconEnter = document.getElementById("lb-fs-enter");
        var iconExit  = document.getElementById("lb-fs-exit");

        // Hide the button entirely on browsers without Fullscreen API (iOS Safari).
        if (!document.fullscreenEnabled && !document.webkitFullscreenEnabled) {
            btn.classList.add("unsupported");
            return;
        }

        btn.addEventListener("mousedown", function (e) {
            e.stopPropagation();
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                var el = lightbox;
                if (el.requestFullscreen)            el.requestFullscreen();
                else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
            } else {
                if (document.exitFullscreen)             document.exitFullscreen();
                else if (document.webkitExitFullscreen)  document.webkitExitFullscreen();
            }
        });

        function onFsChange() {
            var active = !!(document.fullscreenElement || document.webkitFullscreenElement);
            iconEnter.style.display = active ? "none"  : "";
            iconExit.style.display  = active ? ""      : "none";
            btn.setAttribute("aria-label", active ? "Exit fullscreen" : "Toggle fullscreen");
        }
        document.addEventListener("fullscreenchange",       onFsChange);
        document.addEventListener("webkitfullscreenchange", onFsChange);
    }());

    // ── Share button ──────────────────────────────────────────────────────────
    lbShare.addEventListener("mousedown", function (e) {
        e.stopPropagation();
        var img = IMAGES[current];
        if (!img) return;
        var url = location.href;
        if (navigator.share) {
            navigator.share({ title: img.name, url: url }).catch(function () {});
            return;
        }
        function flash() {
            lbShare.classList.add("active");
            setTimeout(function () { lbShare.classList.remove("active"); }, 1800);
        }
        function fallbackCopy() {
            try {
                var tmp = document.createElement("input");
                tmp.value = url; document.body.appendChild(tmp); tmp.select();
                document.execCommand("copy"); document.body.removeChild(tmp);
                flash();
            } catch (err) {}
        }
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(url).then(flash).catch(fallbackCopy);
        } else {
            fallbackCopy();
        }
    });

    lbDownload.addEventListener("mousedown", function (e) { e.stopPropagation(); });

    // ── Copy-link button ──────────────────────────────────────────────────────
    (function () {
        var btn = document.getElementById("lb-copy");
        btn.addEventListener("mousedown", function (e) {
            e.stopPropagation();
            var url = location.href;
            function flash() {
                btn.classList.add("copied");
                setTimeout(function () { btn.classList.remove("copied"); }, 1800);
            }
            function fallbackCopy() {
                try {
                    var tmp = document.createElement("input");
                    tmp.value = url; document.body.appendChild(tmp); tmp.select();
                    document.execCommand("copy"); document.body.removeChild(tmp);
                    flash();
                } catch (err) {}
            }
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(url).then(flash).catch(fallbackCopy);
            } else {
                fallbackCopy();
            }
        });
    }());

    // ── Hot-reload polling ────────────────────────────────────────────────────
    (function startPolling() {
        var INTERVAL = 10000;
        function poll() {
            fetch(location.href, { cache: "no-store" })
                .then(function (r) { return r.text(); })
                .then(function (html) {
                    var match = html.match(/let IMAGES = (\[[\s\S]*?\]);/);
                    if (!match) return;
                    var fresh;
                    try { fresh = JSON.parse(match[1]); } catch (e) { return; }
                    if (fresh.length === IMAGES.length) return;
                    var added = fresh.length - IMAGES.length;
                    var message = added > 0
                        ? "+" + added + " new photo" + (added === 1 ? "" : "s")
                        : Math.abs(added) + " photo" + (Math.abs(added) === 1 ? "" : "s") + " removed";
                    IMAGES = fresh;
                    buildGrid(IMAGES);
                    countEl.textContent = fresh.length + " photo" + (fresh.length === 1 ? "" : "s");
                    if (lightbox.classList.contains("open") && current >= IMAGES.length) closeLightbox();
                    reloadToast.textContent = message;
                    reloadToast.classList.add("show");
                    setTimeout(function () { reloadToast.classList.remove("show"); }, 3000);
                })
                .catch(function () {});
        }
        setInterval(poll, INTERVAL);
    }());

}());
        </script>
    </body>
</html>
